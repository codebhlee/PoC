services:
  postgres:
    image: postgres:16-alpine
    container_name: movie_staging_db
    restart: always
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: movielens_db
    ports:
      - "5432:5432"
    volumes:
      # 1. 데이터 영속성을 위한 볼륨
      - pgdata:/var/lib/postgresql/data
      # 2. 로컬의 CSV 파일들을 컨테이너 내부 /data 폴더로 매핑 (필수!).
      - ./Data/ml-32m:/data
      - ./Data/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      # 대용량 처리를 위한 튜닝 파라미터 (선택사항)
      - "-c"
      - "max_connections=50"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "password_encryption=md5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d movielens_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: movie_qdrant
    restart: always
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  pgdata:
  qdrantdata: